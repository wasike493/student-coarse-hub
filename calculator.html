<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>Cluster Points Calculator</h2>

<form id="calcForm">
  <input type="number" id="math" placeholder="Math grade (points)" required>
  <input type="number" id="eng" placeholder="English grade" required>
  <input type="number" id="bio" placeholder="Biology grade" required>
  <input type="number" id="chem" placeholder="Chemistry grade" required>

  <button type="submit">Calculate</button>
</form>

<script src="js/app.js"></script>

</body>
</html>
