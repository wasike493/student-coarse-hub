<!DOCTYPE html>
<html>
<head>
  <title>Results</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-20 bg-white p-6 rounded-xl shadow">

  <h1 class="text-2xl font-bold mb-4">Your Courses</h1>

  <button onclick="getCourses()" class="bg-blue-600 text-white px-4 py-2 rounded mb-3">
    View Premium Courses
  </button>

  <button onclick="pay()" class="bg-green-600 text-white px-4 py-2 rounded mb-3">
    Pay KSh 50 (Unlock)
  </button>

  <div id="output" class="mt-4 text-gray-700"></div>

</div>

<script>
async function getCourses() {
  const token = localStorage.getItem("token");

  const res = await fetch("http://localhost:3000/premium", {
    headers: { "Authorization": token }
  });

  const text = await res.text();

  document.getElementById("output").innerText = text;
}

async function pay() {
  const token = localStorage.getItem("token");

  await fetch("http://localhost:3000/pay", {
    method: "POST",
    headers: { "Authorization": token }
  });

  alert("Payment successful! Now unlock courses.");
}
</script>

</body>
</html>
