<!DOCTYPE html>
<html>
<head>
  <title>Student Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-xl shadow">
    <h1 class="text-2xl font-bold mb-4">Student Hub Login</h1>

    <input id="email" class="w-full border p-2 mb-3" placeholder="Email">
    <input id="password" type="password" class="w-full border p-2 mb-3" placeholder="Password">

    <button onclick="register()" class="bg-blue-500 text-white px-4 py-2 rounded w-full mb-2">
      Register
    </button>

    <button onclick="login()" class="bg-green-600 text-white px-4 py-2 rounded w-full">
      Login
    </button>
  </div>

<script>
async function register() {
  await fetch("http://localhost:3000/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  alert("Registered! Now login.");
}

async function login() {
  const res = await fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  localStorage.setItem("token", data.token);

  window.location.href = "results.html";
}
</script>

</body>
</html>
